<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokeGen</title>
    <link rel="stylesheet" href="output.css" />
    <!-- defer downloads JS in background while html/css loads-->
    <script src="app.js" defer></script>
  </head>
  <body>
    <!--Can replace all poke with Char or something-->
    <!--Can sign in with github?-->
    <form class="pokeForm" action="poke-gen-form" method="post">
      <fieldset>
        <label for="name">Name:</label>
        <input
          type="text"
          id="pokeName"
          required
          minlength="3"
          maxlength="12"
        />

        <label for="age">
          Age:<output id="ageValue"></output>
          <input id="pokeAge" type="range" min="0" max="1000" step="1" />
        </label>

        <label for="range">
          Height(ft): <output id="heightValue"></output>
          <input id="pokeHeight" type="range" min="1" max="10" step="1" />
        </label>

        <label for="weight">
          Weight(KG): <output id="weightValue"></output>
          <input id="pokeWeight" type="range" min="20" max="500" step="1" />
        </label>

        <label for="class">Class:</label>

        <select name="classes" id="pokeClass">
          <option value="Warrior">Warrior</option>
          <option value="Mage">Mage</option>
          <option value="Cleric">Cleric</option>
          <option value="Ranger">Ranger</option>
        </select>

        <label for="element">Element:</label>

        <select name="elements" id="pokeElement">
          <option value="Fire">Fire</option>
          <option value="Water">Water</option>
          <option value="Wind">Wind</option>
          <option value="Earth">Earth</option>
        </select>
      </fieldset>

      <!-- <fieldset>
        <legend>Stats</legend>

        <label for="attack">Attack:</label>
        <input type="int" id="pokeAttack" />

        <label for="defense">Defense:</label>
        <input type="int" id="pokeDefense" />
      </fieldset> -->

      <p>
        <label for="artwork_ID">Artwork_URL:</label>
        <input type="url" id="pokeArtwork" />
      </p>
      <p class="submitBtn">
        <button type="submit" onclick="event.preventDefault()">
          Generate!
        </button>
      </p>
    </form>
  </body>
</html>
